services:
  db:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: minha_app_db
    ports:
      - "3307:3306"  # Expondo o MySQL na porta 3307 da sua máquina local
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: ./app    # Caminho para o seu Dockerfile
    container_name: minha_app_container
    depends_on:
      - db          # Garante que o banco suba antes da app
    environment:
      # IMPORTANTE: Dentro da rede do Docker, use o NOME DO SERVIÇO e a PORTA PADRÃO
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: minha_app_db

volumes:
  db_data: